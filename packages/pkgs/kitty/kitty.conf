# Fonts
font_family FiraCode
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A2,U+E0A3,U+E0B0-U+E0B3,U+E0B4-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E600-U+E6C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F372,U+F400-U+F532,U+F0001-U+F1AF0 Symbols Nerd Font
symbol_map U+0600-U+06FF,U+200C-U+200E,U+2010-U+2011,U+204F,U+2E41,U+FB50-U+FDFF,U+FE80-U+FEFC Vazir Code
disable_ligatures always

# Cursor and shell
cursor_shape block
cursor_beam_thickness 2
shell_integration no-cursor no-sudo no-title

# Scrolling and URLs
scrollback_lines 8000
url_prefixes http https gs
mouse_map ctrl+left release grabbed,ungrabbed mouse_click_url

# Window and tabs
enable_audio_bell no
window_padding_width 2.5 5
hide_window_decorations titlebar-only
tab_bar_style powerline
tab_title_template "{f'{index}:{title}' if title.startswith(" ") else index}"
map ctrl+, set_tab_title
active_tab_foreground #282828
active_tab_background #fabd2f
active_tab_font_style bold
inactive_tab_foreground #ebdbb2
inactive_tab_background #504945
inactive_tab_font_style normal
background_opacity 0.97

# Clipboard and platform behavior
clipboard_control write-clipboard write-primary read-clipboard
term xterm-kitty
macos_option_as_alt yes

# Clipboard shortcuts
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard
map shift+insert paste_from_clipboard

# Scrolling shortcuts
map shift+up scroll_line_up
map shift+down scroll_line_down
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end

# Font-size shortcuts
map ctrl+equal change_font_size current +3.0
map ctrl+minus change_font_size current -3.0
map ctrl+shift+equal change_font_size current +1.0
map ctrl+shift+minus change_font_size current -1.0
map ctrl+0 change_font_size current 0

# Keep both existing themes available; theme.conf is the final override.
include popping-n-locking-theme.conf
include theme.conf
selection_background #555555

# VS Code-style jump back/forward for Neovim.
map cmd+[ send_text all \x0f
map cmd+] send_text all \x09
